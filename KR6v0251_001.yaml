body:
  text: 之一碑陽菩薩主迦葉多寶像主菩薩主當陽像主都像主供養主陳神薑菩薩主釋迦像主阿難主林由憘菩薩主開明主萬金剛主至道虛凝妙絶常境為欲化物誕應王宮化盡有緣終歸大寂自真儀隱影倉生懷感然佛弟子合邑人等共相率化於大統十三年歲次丁卯九月八日仰為皇帝陛下法界含生敬造石像一區素飾端華真容等就願以茲因國祚遐延八表寧泰存亡同益有形離苦龍華三會願登上首之二碑陰菩薩主堪主堪主堪主迦葉主彌勒像主阿難主堪主堪主堪主堪主邑師尼普達維那李舍邑子杜龍姬邑子李伏薑邑子景小比丘尼惠首維那郭賜薑邑子楊俄容邑子王女神邑子比丘尼惠暈維那郭豐光邑子楊愛姿邑子田阿端邑子比丘尼普勝邑子向阿容邑子劉阿真邑子暢桃枝邑子邑主陳神薑邑子王敷邑子馮歡姿邑子司馬玉端邑子維那馮媚女邑子王照明邑子趙子女邑子常恭敬邑子曹維那郭女林邑子郭屬女邑子郭樂女邑子樂光好邑子牛維那陳子王火暫邑子郭小女邑子邵照鏡邑子曲維那冀俄邑子牛俄綾邑子賀勝好邑子張容女邑子杜維那尹易綾邑子王妙羅邑子郭阿賤邑子王照貴邑子陳維那張善貴邑子張容堂邑子朝午女邑子蘇敬好邑子杜維那郭留容邑子王摩女邑子殷貴女邑子陳曇如邑子劉阿華維那裴小女邑子李雙妃邑子張要勝邑子王羅東邑子任維那劉惡女邑子杵貴英邑子孫女足邑子陳阿匡邑子楊回維那馬曇花邑子薛容親邑子張清貴邑子王舍王邑子曹維那魏先姬邑子張先邑子張阿那邑子馬神敬邑子陳維那樂回容邑子張普榮邑子賀金勝邑子杜阿維那張三妤邑子呂姿邑子樂光俄邑子秦俄朱之三碑側堪主堪主堪主堪主堪主堪主堪主堪主堪主堪主堪主堪主比丘尼僧比丘尼智比丘尼智藏比丘尼智深比丘尼靜璨比丘尼曇貴比丘尼惠玉邑子杜曇敬邑子杜阿法邑子杜轉好邑子郭清貴邑子傅阿要邑子張樂容邑子張扶容之四碑側堪主堪主堪主堪主堪主堪主扶像主裴小女堪主堪主堪主堪主堪主堪主扶像主杜元智維那邵映薑邑子郭先光邑子鄭真珠維那鄭錦綾邑子景元姿邑子杜樂堂維那李阿明邑子王金光邑子蔡女足維那郭織女邑子李惠廣邑子朱外女邑子荊小女邑子李明暈邑子陳匡媚邑子王女王邑子呂阿敬邑子古雍容邑子祁小女邑子魏阿緑邑子李阿樂邑子呂阿真邑子郭豐綾邑子李明勝邑子薛明薑邑子殷神好邑子郭華容邑子杜蓮華邑子陰歸姬邑子諸葛歡姬邑子郭姬邑子杜伏薑邑子鄭祭買邑子司馬亂薑邑子公孫始王邑子馮新堂邑子張阿雙邑子楊女子邑子張胡女邑子任楊買邑子陶女兒邑子薛妙薑邑子鄭惡女邑子牛映棌
